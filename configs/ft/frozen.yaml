eval_mode: "linear_and_knn"       # "linear" | "knn" | "linear_and_knn" | "attentive"
feature_pool: "gap"                # "gap" | "flatten"
feature_cache_dir: "./feature_cache"
out_dir: "./frozen_eval_out"
task: "regression"
use_attentive_pooling: false
batch_size: 32                     # for encoder forward pass
num_workers: 4
run_name: null                     # null -> auto-generated from checkpoint

linear:
  bias: true

knn:
  ks: [1, 5, 10, 20, 50]
  metrics: ["euclidean", "cosine"]
  chunk_size: 1024
