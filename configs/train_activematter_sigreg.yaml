defaults:
  - dataset: active_matter
  - model: conv_small
  - ft: linear

# Active-matter pretrain with the LeWM-style SIGReg regularizer instead of
# VICReg. Other knobs (dataset / resolution / fft / schedule) mirror the
# baseline train_activematter_small.yaml so results are directly comparable.

dataset:
  num_frames: 16
  resize_mode: fft
  resolution: [256, 256]

model:
  objective: "jepa"
  dims: [16, 32, 64, 128, 128]
  num_res_blocks: [3, 3, 3, 9, 3]

train:
  num_epochs: 30
  batch_size: 8
  precision: "bf16"
  report_every: 100
  save_every: 2
  include_labels: false
  # --- SIGReg / LeWM objective -------------------------------------------
  regularizer: "sigreg"
  sim_coeff: 1.0        # weight on MSE next-step prediction loss
  bcs_coeff: 0.1        # LeWM default lambda for SIGReg
  num_slices: 1024      # LeWM default M
  # -----------------------------------------------------------------------
  predict_n_steps: false
  lr_scheduler: "cosine"
  lr_scheduler_warmup_epochs: 2
  min_lr: 1e-6
  lr: 1e-3
  weight_decay: 0.05
  grad_clip_norm: 1.0
  noise_std: 1.0
  run_name: "sigreg-fft-native"
  distributed: true

ft:
  task: "regression"
  use_attentive_pooling: true
  lr_scheduler: "cosine"
  lr_scheduler_warmup_epochs: 2
  min_lr: 0
  lr: 1e-3
  weight_decay: 0.01
  noise_std: 1.0
  run_name: "activematter-sigreg-FT"
  distributed: false

out_path: "./checkpoints"
cache_path: "./dataset_cache"

post_train_eval:
  enabled: true
  probes: [linear, knn, attentive]
  frozen_config: configs/train_activematter_frozen.yaml
  on_save: true
  on_save_blocking: true
  on_save_probes: [linear, knn]
